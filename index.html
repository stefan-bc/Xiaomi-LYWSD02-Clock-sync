<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYWSD02 Clock Sync</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%237c3aed'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><circle cx='16' cy='16' r='12' fill='%231d232a'/><circle cx='16' cy='16' r='1.2' fill='%23fff'/><line x1='16' y1='16' x2='16' y2='8' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><line x1='16' y1='16' x2='22' y2='18' stroke='%23fff' stroke-width='1.5' stroke-linecap='round'/><g fill='%23fff' opacity='.6'><circle cx='16' cy='5.5' r='.7'/><circle cx='16' cy='26.5' r='.7'/><circle cx='5.5' cy='16' r='.7'/><circle cx='26.5' cy='16' r='.7'/></g></svg>">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-300">

  <!-- Chromium-only warning -->
  <div id="ble-warning" role="alert" class="alert alert-warning m-4 hidden">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span>Web Bluetooth requires a Chromium-based browser.</span>
  </div>

  <div class="max-w-5xl mx-auto p-4 flex flex-col gap-4">

    <!-- Top bar -->
    <div class="navbar bg-base-100 rounded-box shadow-xl px-6">
      <div class="navbar-start">
        <h1 class="text-lg font-bold">LYWSD02 Clock Sync</h1>
      </div>
      <div class="navbar-center">
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1 font-mono text-3xl tabular-nums text-base-content">
            <span class="countdown"><span id="hrs" style="--value:0;"></span></span>:
            <span class="countdown"><span id="min" style="--value:0;"></span></span>
          </div>
          <div class="badge badge-neutral badge-sm font-mono" id="tz-label"></div>
        </div>
      </div>
      <div class="navbar-end gap-2">
        <button id="btn-sync-all" class="btn btn-primary btn-sm gap-2">
          <span id="sync-all-label">Sync all</span>
          <span id="sync-all-spinner" class="loading loading-spinner loading-md hidden"></span>
        </button>
        <button id="btn-add" class="btn btn-secondary btn-outline btn-sm">Add device</button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast-wrap" class="toast toast-end toast-bottom z-50 hidden">
      <div id="status-alert" role="alert" class="alert alert-sm cursor-pointer" onclick="document.getElementById('toast-wrap').classList.add('hidden')">
        <span id="status-text"></span>
      </div>
    </div>

    <!-- Known devices -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body p-5 gap-3">
        <div class="flex items-center gap-2">
          <h2 class="card-title text-sm">Known devices</h2>
          <div id="device-count" class="badge badge-accent badge-sm hidden"></div>
        </div>
        <div id="devices-loading" class="flex flex-col gap-2 py-2">
          <div class="skeleton h-4 w-full"></div>
          <div class="skeleton h-4 w-3/4"></div>
          <div class="skeleton h-4 w-5/6"></div>
        </div>
        <div id="devices-empty" class="text-sm opacity-40 py-4 text-center hidden">No devices remembered yet. Click "Add device" to pair one.</div>
        <div id="devices-table-wrap" class="overflow-x-auto hidden">
          <table class="table table-sm w-full">
            <thead>
              <tr>
                <th>Name</th>
                <th>Location</th>
                <th>ID</th>
                <th>Last synced</th>
                <th>Last temp</th>
                <th>Last humidity</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="devices-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Sync log -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body p-5 gap-3">
        <div class="flex items-center justify-between">
          <h2 class="card-title text-sm">Sync log</h2>
          <button id="btn-clear-log" class="btn btn-ghost btn-xs opacity-40 hover:opacity-100 hidden">Clear</button>
        </div>
        <div id="log-empty" class="text-sm opacity-40 py-4 text-center">No syncs yet.</div>
        <div id="log-table-wrap" class="overflow-y-auto max-h-64 hidden">
          <table class="table table-sm w-full">
            <thead class="sticky top-0 bg-base-100 z-10">
              <tr>
                <th>Device</th>
                <th>Status</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="log-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-xs opacity-30 font-mono py-2">
      Last updated: 2026-03-31 13:04 IST
    </footer>

  </div>

<script>
var TIME_SERVICE  = 'ebe0ccb0-7a0a-4b0c-8a1a-6ff2997da3a6';
var TIME_CHAR     = 'ebe0ccb7-7a0a-4b0c-8a1a-6ff2997da3a6';
var UNIT_CHAR     = 'ebe0ccbe-7a0a-4b0c-8a1a-6ff2997da3a6';
var TEMP_HUM_CHAR = 'ebe0ccc1-7a0a-4b0c-8a1a-6ff2997da3a6';

var hrsEl = document.getElementById('hrs');
var minEl = document.getElementById('min');
var tzLabel = document.getElementById('tz-label');
var btnSyncAll = document.getElementById('btn-sync-all');
var syncAllLabel = document.getElementById('sync-all-label');
var syncAllSpinner = document.getElementById('sync-all-spinner');
var btnAdd = document.getElementById('btn-add');
var statusAlert = document.getElementById('status-alert');
var statusText = document.getElementById('status-text');
var toastWrap = document.getElementById('toast-wrap');
var devicesBody = document.getElementById('devices-body');
var devicesEmpty = document.getElementById('devices-empty');
var devicesLoading = document.getElementById('devices-loading');
var devicesTableWrap = document.getElementById('devices-table-wrap');
var deviceCount = document.getElementById('device-count');
var logBody = document.getElementById('log-body');
var logEmpty = document.getElementById('log-empty');
var logTableWrap = document.getElementById('log-table-wrap');
var btnClearLog = document.getElementById('btn-clear-log');

if (!('bluetooth' in navigator)) {
  document.getElementById('ble-warning').classList.remove('hidden');
  btnSyncAll.disabled = true;
  btnAdd.disabled = true;
}

/* ---- Utilities ---- */

function getTimezoneOffsetHours() {
  return -(new Date().getTimezoneOffset() / 60);
}

var h = getTimezoneOffsetHours();
tzLabel.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone + ' UTC' + (h >= 0 ? '+' : '') + h;

function updateClock() {
  var now = new Date();
  hrsEl.style.setProperty('--value', now.getHours());
  minEl.style.setProperty('--value', now.getMinutes());
}
updateClock();
setInterval(updateClock, 1000);

function pad(n) { return String(n).padStart(2, '0'); }

function formatTime(d) {
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function friendlyError(error) {
  var msg = String(error);
  if (msg.indexOf('cancelled') !== -1 || msg.indexOf('canceled') !== -1) return 'Cancelled';
  if (msg.indexOf('connect') !== -1) return 'Connection failed';
  if (msg.indexOf('not found') !== -1) return 'Device not found';
  if (msg.indexOf('denied') !== -1) return 'Permission denied';
  return msg;
}

/* ---- Toast ---- */

var toastTimer = null;

function setStatus(message, type) {
  statusAlert.className = 'alert alert-sm cursor-pointer';
  if (type === 'success') statusAlert.classList.add('alert-success');
  else if (type === 'error') statusAlert.classList.add('alert-error');
  else statusAlert.classList.add('alert-info');
  statusText.textContent = message;
  toastWrap.classList.remove('hidden');
  clearTimeout(toastTimer);
  if (type === 'success' || type === 'error') {
    toastTimer = setTimeout(function () { toastWrap.classList.add('hidden'); }, 3000);
  }
}

function setSyncing(active) {
  btnSyncAll.disabled = active;
  syncAllLabel.classList.toggle('hidden', active);
  syncAllSpinner.classList.toggle('hidden', !active);
}

/* ---- Device registry ---- */

var devicesRegistry = {};

/* Look up the friendly name for a device ID from the registry */
function resolveDeviceName(bleDeviceName, id) {
  var key = id || bleDeviceName;
  if (devicesRegistry[key] && devicesRegistry[key].name) {
    return devicesRegistry[key].name;
  }
  return bleDeviceName || id || '-';
}

function loadDevicesJson() {
  return fetch('devices.json')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      var list = data.devices || [];
      for (var i = 0; i < list.length; i++) {
        var dev = list[i];
        var key = dev.id || dev.name;
        if (!devicesRegistry[key]) {
          devicesRegistry[key] = {
            name: dev.name || '',
            id: dev.id || '',
            location: dev.location || '',
            lastSynced: null,
            lastTemp: null,
            lastHumidity: null
          };
        }
      }
      devicesLoading.classList.add('hidden');
      renderDevicesTable();
    })
    .catch(function () {
      devicesLoading.classList.add('hidden');
      devicesEmpty.classList.remove('hidden');
    });
}

function updateDeviceRegistry(id, extra) {
  if (!id) return;
  if (!devicesRegistry[id]) {
    devicesRegistry[id] = { name: '', id: id, location: '', lastSynced: null, lastTemp: null, lastHumidity: null };
  }
  if (extra) {
    if (extra.synced) devicesRegistry[id].lastSynced = extra.synced;
    if (extra.temp !== undefined) devicesRegistry[id].lastTemp = extra.temp;
    if (extra.humidity !== undefined) devicesRegistry[id].lastHumidity = extra.humidity;
  }
  renderDevicesTable();
}

function renderDevicesTable() {
  var keys = Object.keys(devicesRegistry);
  if (keys.length === 0) {
    devicesEmpty.classList.remove('hidden');
    devicesTableWrap.classList.add('hidden');
    deviceCount.classList.add('hidden');
    return;
  }
  devicesEmpty.classList.add('hidden');
  devicesTableWrap.classList.remove('hidden');
  deviceCount.textContent = keys.length;
  deviceCount.classList.remove('hidden');
  devicesBody.innerHTML = '';

  /* Sort by name numerically: Clock 1, Clock 2, ... Unnamed last */
  keys.sort(function (a, b) {
    var na = devicesRegistry[a].name || '';
    var nb = devicesRegistry[b].name || '';
    var numA = parseInt(na.replace(/\D/g, ''), 10) || 9999;
    var numB = parseInt(nb.replace(/\D/g, ''), 10) || 9999;
    return numA - numB;
  });

  for (var i = 0; i < keys.length; i++) {
    var dev = devicesRegistry[keys[i]];
    var tr = document.createElement('tr');

    var tdName = document.createElement('td');
    tdName.innerHTML = '<span class="badge badge-info badge-sm">' + (dev.name || 'Unnamed') + '</span>';

    var tdLocation = document.createElement('td');
    if (dev.location) {
      tdLocation.textContent = dev.location;
    } else {
      tdLocation.innerHTML = '<span class="opacity-20">\u2014</span>';
    }

    var tdId = document.createElement('td');
    tdId.className = 'font-mono text-xs select-all cursor-pointer break-all max-w-[14rem] opacity-50';
    tdId.textContent = dev.id || '-';

    var tdSynced = document.createElement('td');
    tdSynced.className = 'font-mono text-sm whitespace-nowrap';
    if (dev.lastSynced) {
      tdSynced.innerHTML = '<span class="text-success">' + formatTime(new Date(dev.lastSynced)) + '</span>';
    } else {
      tdSynced.innerHTML = '<span class="opacity-20">never</span>';
    }

    var tdTemp = document.createElement('td');
    tdTemp.className = 'font-mono';
    if (dev.lastTemp !== null) {
      tdTemp.innerHTML = '<span class="text-warning">' + dev.lastTemp.toFixed(1) + ' °C</span>';
    } else {
      tdTemp.innerHTML = '<span class="opacity-20">\u2014</span>';
    }

    var tdHum = document.createElement('td');
    tdHum.className = 'font-mono';
    if (dev.lastHumidity !== null) {
      tdHum.innerHTML = '<span class="text-accent">' + dev.lastHumidity + ' %</span>';
    } else {
      tdHum.innerHTML = '<span class="opacity-20">\u2014</span>';
    }

    var tdAction = document.createElement('td');
    var btn = document.createElement('button');
    btn.className = 'badge badge-primary badge-sm cursor-pointer hover:brightness-125';
    btn.textContent = 'Sync';
    btn.dataset.deviceId = dev.id;
    btn.addEventListener('click', function () {
      syncSingleById(this.dataset.deviceId, this);
    });
    tdAction.appendChild(btn);

    tr.appendChild(tdName);
    tr.appendChild(tdLocation);
    tr.appendChild(tdId);
    tr.appendChild(tdSynced);
    tr.appendChild(tdTemp);
    tr.appendChild(tdHum);
    tr.appendChild(tdAction);
    devicesBody.appendChild(tr);
  }
}

/* ---- Sync log ---- */

function getHistory() {
  return JSON.parse(localStorage.getItem('lywsd02_history') || '[]');
}

function saveToHistory(entry) {
  var history = getHistory();
  history.push(entry);
  localStorage.setItem('lywsd02_history', JSON.stringify(history));
}

function showLogTable() {
  logEmpty.classList.add('hidden');
  logTableWrap.classList.remove('hidden');
  btnClearLog.classList.remove('hidden');
}

function addLogRow(displayName, status, time) {
  showLogTable();
  var tr = document.createElement('tr');

  var tdName = document.createElement('td');
  tdName.innerHTML = '<span class="badge badge-info badge-sm">' + displayName + '</span>';

  var tdStatus = document.createElement('td');
  if (status === 'error') {
    tr.className = 'opacity-40';
    tdStatus.innerHTML = '<span class="badge badge-error badge-sm">failed</span>';
  } else {
    tdStatus.innerHTML = '<span class="badge badge-success badge-sm">synced</span>';
  }

  var tdTime = document.createElement('td');
  tdTime.className = 'font-mono text-sm whitespace-nowrap';
  tdTime.textContent = typeof time === 'string' ? formatTime(new Date(time)) : formatTime(time);

  tr.appendChild(tdName);
  tr.appendChild(tdStatus);
  tr.appendChild(tdTime);
  logBody.insertBefore(tr, logBody.firstChild);
}

function logSync(bleName, id, status) {
  var now = new Date();
  var displayName = resolveDeviceName(bleName, id);
  addLogRow(displayName, status, now);
  saveToHistory({ name: displayName, id: id, action: status || 'synced', time: now.toISOString() });
  if (id && status !== 'error') {
    updateDeviceRegistry(id, { synced: now.toISOString() });
  }
}

function logReading(bleName, id, tempC, humidity) {
  if (id) {
    updateDeviceRegistry(id, { temp: tempC, humidity: humidity });
  }
}

/* Clear log */
btnClearLog.addEventListener('click', function () {
  localStorage.removeItem('lywsd02_history');
  logBody.innerHTML = '';
  logTableWrap.classList.add('hidden');
  logEmpty.classList.remove('hidden');
  btnClearLog.classList.add('hidden');
});

/* ---- BLE ---- */

function readTempHumidity(service, bleName, id) {
  return service.getCharacteristic(TEMP_HUM_CHAR)
    .then(function (char) {
      return new Promise(function (resolve) {
        char.addEventListener('characteristicvaluechanged', function handler(event) {
          char.removeEventListener('characteristicvaluechanged', handler);
          var data = event.target.value;
          var tempRaw = data.getInt16(0, true);
          var tempC = tempRaw / 100;
          var humidity = data.getUint8(2);
          logReading(bleName, id, tempC, humidity);
          char.stopNotifications().then(resolve).catch(resolve);
        });
        char.startNotifications();
      });
    })
    .catch(function () {});
}

function buildTimePayload() {
  var timestamp = Math.floor(Date.now() / 1000);
  var offset = getTimezoneOffsetHours();
  var buffer = new ArrayBuffer(5);
  var view = new DataView(buffer);
  view.setUint32(0, timestamp, true);
  view.setInt8(4, offset);
  return buffer;
}

function syncDevice(device) {
  var bleName = device.name || '';
  var id = device.id || '';
  return device.gatt.connect()
    .then(function (server) {
      return server.getPrimaryService(TIME_SERVICE);
    })
    .then(function (service) {
      return service.getCharacteristic(TIME_CHAR)
        .then(function (char) {
          return char.writeValue(buildTimePayload());
        })
        .then(function () {
          logSync(bleName, id);
          return readTempHumidity(service, bleName, id);
        });
    })
    .then(function () {
      if (device.gatt.connected) device.gatt.disconnect();
    })
    .catch(function () {
      logSync(bleName, id, 'error');
      if (device.gatt.connected) device.gatt.disconnect();
    });
}

/* Wait for a device to advertise, then sync it. Timeout after 10s. */
function waitAndSync(device) {
  return new Promise(function (resolve) {
    var done = false;
    function finish() { if (!done) { done = true; resolve(); } }

    var timer = setTimeout(function () {
      logSync(device.name || '', device.id || '', 'error');
      finish();
    }, 10000);

    device.addEventListener('advertisementreceived', function onAdv() {
      device.removeEventListener('advertisementreceived', onAdv);
      clearTimeout(timer);
      syncDevice(device).then(finish).catch(finish);
    });

    device.watchAdvertisements({ signal: AbortSignal.timeout(10000) })
      .catch(function () {
        clearTimeout(timer);
        syncDevice(device).then(finish).catch(finish);
      });
  });
}

/* Sync a single device by ID */
function syncSingleById(deviceId, btn) {
  var originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span>';

  function restore() {
    btn.disabled = false;
    btn.textContent = originalText;
  }

  var friendlyName = resolveDeviceName('', deviceId);

  if (!navigator.bluetooth.getDevices) {
    setStatus('Select ' + friendlyName + ' from picker', 'info');
    navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [TIME_SERVICE] })
      .then(function (device) { return syncDevice(device); })
      .then(function () { setStatus('Done', 'success'); restore(); })
      .catch(function (err) { setStatus(friendlyError(err), 'error'); restore(); });
    return;
  }

  setStatus('Connecting to ' + friendlyName + '\u2026', 'info');

  navigator.bluetooth.getDevices()
    .then(function (devices) {
      var match = null;
      for (var i = 0; i < devices.length; i++) {
        if (devices[i].id === deviceId) { match = devices[i]; break; }
      }
      if (!match) {
        setStatus('Select ' + friendlyName + ' from picker', 'info');
        return navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [TIME_SERVICE] })
          .then(function (device) { return syncDevice(device); })
          .then(function () { setStatus('Done', 'success'); });
      }

      /* Try direct connect first — works when device is nearby and idle */
      return syncDevice(match)
        .then(function () { setStatus('Done', 'success'); });
    })
    .then(restore)
    .catch(function (err) { setStatus(friendlyError(err), 'error'); restore(); });
}

/* ---- Init ---- */

function loadHistory() {
  var history = getHistory();
  for (var i = 0; i < history.length; i++) {
    var entry = history[i];
    if (entry.action !== undefined) {
      var displayName = resolveDeviceName(entry.name, entry.id);
      addLogRow(displayName, entry.action, entry.time);
    }
  }
}

/* Load devices.json first, then render history so names resolve correctly */
loadDevicesJson().then(loadHistory);

/* ---- Buttons ---- */

btnAdd.addEventListener('click', function () {
  navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [TIME_SERVICE] })
    .then(function (device) {
      if (!devicesRegistry[device.id]) {
        devicesRegistry[device.id] = { name: '', id: device.id, location: '', lastSynced: null, lastTemp: null, lastHumidity: null };
        renderDevicesTable();
      }
      setStatus('Syncing ' + resolveDeviceName(device.name, device.id) + '\u2026', 'info');
      return syncDevice(device);
    })
    .then(function () { setStatus('Done', 'success'); })
    .catch(function (error) { setStatus(friendlyError(error), 'error'); });
});

btnSyncAll.addEventListener('click', function () {
  if (!navigator.bluetooth.getDevices) {
    setStatus('Enable chrome://flags/#enable-web-bluetooth-new-permissions-backend', 'error');
    return;
  }

  setStatus('Scanning\u2026', 'info');
  setSyncing(true);

  navigator.bluetooth.getDevices()
    .then(function (pairedDevices) {
      /* Build a set of paired device IDs */
      var pairedIds = {};
      for (var i = 0; i < pairedDevices.length; i++) {
        pairedIds[pairedDevices[i].id] = pairedDevices[i];
      }

      /* Find which devices from the registry are not yet paired */
      var unpaired = [];
      var keys = Object.keys(devicesRegistry);
      for (var j = 0; j < keys.length; j++) {
        var dev = devicesRegistry[keys[j]];
        if (dev.id && !pairedIds[dev.id]) {
          unpaired.push(dev);
        }
      }

      var total = pairedDevices.length + unpaired.length;
      var done = 0;

      if (total === 0) {
        setStatus('No devices \u2014 add one first', 'error');
        setSyncing(false);
        return;
      }

      setStatus('Syncing 0/' + total + '\u2026', 'info');

      /* Phase 1: sync all already-paired devices in parallel */
      var pairedPromises = pairedDevices.map(function (device) {
        return waitAndSync(device).then(function () {
          done++;
          setStatus('Syncing ' + done + '/' + total + '\u2026', 'info');
        });
      });

      return Promise.all(pairedPromises).then(function () {
        if (unpaired.length === 0) return;

        /* Phase 2: prompt picker for each unpaired device, one at a time */
        var chain = Promise.resolve();
        unpaired.forEach(function (dev) {
          chain = chain.then(function () {
            setStatus('Pair "' + (dev.name || 'device') + '" \u2014 select it from the picker', 'info');
            return navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [TIME_SERVICE] })
              .then(function (device) {
                return syncDevice(device).then(function () {
                  done++;
                  setStatus('Syncing ' + done + '/' + total + '\u2026', 'info');
                });
              })
              .catch(function () {
                /* User cancelled picker, skip this device */
                done++;
              });
          });
        });
        return chain;
      });
    })
    .then(function () { setStatus('All done', 'success'); setSyncing(false); })
    .catch(function (error) { setStatus(friendlyError(error), 'error'); setSyncing(false); });
});
</script>
</body>
</html>
