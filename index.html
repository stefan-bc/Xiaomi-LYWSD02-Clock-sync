<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYWSD02 Clock Sync</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%237c3aed'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><circle cx='16' cy='16' r='12' fill='%231d232a'/><circle cx='16' cy='16' r='1.2' fill='%23fff'/><line x1='16' y1='16' x2='16' y2='8' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><line x1='16' y1='16' x2='22' y2='18' stroke='%23fff' stroke-width='1.5' stroke-linecap='round'/><g fill='%23fff' opacity='.6'><circle cx='16' cy='5.5' r='.7'/><circle cx='16' cy='26.5' r='.7'/><circle cx='5.5' cy='16' r='.7'/><circle cx='26.5' cy='16' r='.7'/></g></svg>">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-300">

  <!-- Chromium-only warning -->
  <div id="ble-warning" role="alert" class="alert alert-warning m-4 hidden">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span>Web Bluetooth requires a Chromium-based browser.</span>
  </div>

  <div class="max-w-5xl mx-auto p-4 flex flex-col gap-4">

    <!-- Top bar -->
    <div class="navbar bg-base-100 rounded-box shadow-xl px-6">
      <div class="navbar-start">
        <h1 class="text-lg font-bold">LYWSD02 Clock Sync</h1>
      </div>
      <div class="navbar-center">
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1 font-mono text-3xl tabular-nums">
            <span class="countdown"><span id="hrs" style="--value:0;"></span></span>:
            <span class="countdown"><span id="min" style="--value:0;"></span></span>
          </div>
          <div class="badge badge-neutral badge-sm font-mono" id="tz-label"></div>
        </div>
      </div>
      <div class="navbar-end gap-2">
        <button id="btn-sync-all" class="btn btn-primary btn-sm">
          <span id="sync-all-label">Sync all</span>
          <span id="sync-all-spinner" class="loading loading-spinner loading-md hidden"></span>
        </button>
        <button id="btn-add" class="btn btn-ghost btn-sm">Add device</button>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-alert" role="alert" class="alert hidden">
      <span id="status-text"></span>
    </div>

    <!-- Known devices -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body p-5 gap-3">
        <h2 class="card-title text-sm">Known devices</h2>
        <!-- Loading skeleton shown while fetching devices.json -->
        <div id="devices-loading" class="flex flex-col gap-2 py-2">
          <div class="skeleton h-4 w-full"></div>
          <div class="skeleton h-4 w-3/4"></div>
          <div class="skeleton h-4 w-5/6"></div>
        </div>
        <div id="devices-empty" class="text-sm opacity-40 py-4 text-center hidden">No devices remembered yet. Click "Add device" to pair one.</div>
        <div id="devices-table-wrap" class="overflow-x-auto hidden">
          <table class="table table-sm table-zebra w-full">
            <thead class="sticky top-0 bg-base-100 z-10">
              <tr>
                <th>Name</th>
                <th>Location</th>
                <th>ID</th>
                <th>Last synced</th>
                <th>Last temp</th>
                <th>Last humidity</th>
              </tr>
            </thead>
            <tbody id="devices-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Sync log -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body p-5 gap-3">
        <h2 class="card-title text-sm">Sync log</h2>
        <div id="log-empty" class="text-sm opacity-40 py-4 text-center">No syncs yet.</div>
        <div id="log-table-wrap" class="overflow-y-auto max-h-64 hidden">
          <table class="table table-sm table-zebra w-full">
            <thead class="sticky top-0 bg-base-100 z-10">
              <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Status</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="log-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-xs opacity-30 font-mono py-2">
      Last updated: 2026-03-31 12:00 IST
    </footer>

  </div>

<script>
var TIME_SERVICE  = 'ebe0ccb0-7a0a-4b0c-8a1a-6ff2997da3a6';
var TIME_CHAR     = 'ebe0ccb7-7a0a-4b0c-8a1a-6ff2997da3a6';
var UNIT_CHAR     = 'ebe0ccbe-7a0a-4b0c-8a1a-6ff2997da3a6';
var TEMP_HUM_CHAR = 'ebe0ccc1-7a0a-4b0c-8a1a-6ff2997da3a6';

var hrsEl = document.getElementById('hrs');
var minEl = document.getElementById('min');
var tzLabel = document.getElementById('tz-label');
var btnSyncAll = document.getElementById('btn-sync-all');
var syncAllLabel = document.getElementById('sync-all-label');
var syncAllSpinner = document.getElementById('sync-all-spinner');
var btnAdd = document.getElementById('btn-add');
var statusAlert = document.getElementById('status-alert');
var statusText = document.getElementById('status-text');
var devicesBody = document.getElementById('devices-body');
var devicesEmpty = document.getElementById('devices-empty');
var devicesLoading = document.getElementById('devices-loading');
var devicesTableWrap = document.getElementById('devices-table-wrap');
var logBody = document.getElementById('log-body');
var logEmpty = document.getElementById('log-empty');
var logTableWrap = document.getElementById('log-table-wrap');

if (!('bluetooth' in navigator)) {
  document.getElementById('ble-warning').classList.remove('hidden');
  btnSyncAll.disabled = true;
  btnAdd.disabled = true;
}

function getTimezoneOffsetHours() {
  return -(new Date().getTimezoneOffset() / 60);
}

var h = getTimezoneOffsetHours();
var sign = h >= 0 ? '+' : '';
tzLabel.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone + ' UTC' + sign + h;

function updateClock() {
  var now = new Date();
  hrsEl.style.setProperty('--value', now.getHours());
  minEl.style.setProperty('--value', now.getMinutes());
}
updateClock();
setInterval(updateClock, 1000);

function formatTime(d) {
  var pad = function (n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function friendlyError(error) {
  var msg = String(error);
  if (msg.indexOf('cancelled') !== -1 || msg.indexOf('canceled') !== -1) return 'Cancelled';
  if (msg.indexOf('connect') !== -1) return 'Connection failed';
  if (msg.indexOf('not found') !== -1) return 'Device not found';
  if (msg.indexOf('denied') !== -1) return 'Permission denied';
  return msg;
}

function setStatus(message, type) {
  statusAlert.className = 'alert';
  if (type === 'success') statusAlert.classList.add('alert-success');
  else if (type === 'error') statusAlert.classList.add('alert-error');
  else statusAlert.classList.add('alert-info');
  statusText.textContent = message;
  statusAlert.classList.remove('hidden');
}

/* Show/hide sync button loading state */
function setSyncing(active) {
  btnSyncAll.disabled = active;
  syncAllLabel.classList.toggle('hidden', active);
  syncAllSpinner.classList.toggle('hidden', !active);
}

/* ---- Known devices (loaded from devices.json, runtime state in memory) ---- */

var devicesRegistry = {};

function loadDevicesJson() {
  return fetch('devices.json')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      var list = data.devices || [];
      for (var i = 0; i < list.length; i++) {
        var dev = list[i];
        var key = dev.id || dev.name;
        if (!devicesRegistry[key]) {
          devicesRegistry[key] = {
            name: dev.name || '',
            id: dev.id || '',
            location: dev.location || '',
            lastSynced: null,
            lastTemp: null,
            lastHumidity: null
          };
        }
      }
      devicesLoading.classList.add('hidden');
      renderDevicesTable();
    })
    .catch(function () {
      devicesLoading.classList.add('hidden');
      devicesEmpty.classList.remove('hidden');
    });
}

function updateDeviceRegistry(name, id, extra) {
  var key = id || name;
  if (!devicesRegistry[key]) {
    devicesRegistry[key] = { name: name, id: id, location: '', lastSynced: null, lastTemp: null, lastHumidity: null };
  }
  if (name) devicesRegistry[key].name = name;
  if (extra) {
    if (extra.synced) devicesRegistry[key].lastSynced = extra.synced;
    if (extra.temp !== undefined) devicesRegistry[key].lastTemp = extra.temp;
    if (extra.humidity !== undefined) devicesRegistry[key].lastHumidity = extra.humidity;
  }
  renderDevicesTable();
}

function renderDevicesTable() {
  var keys = Object.keys(devicesRegistry);
  if (keys.length === 0) {
    devicesEmpty.classList.remove('hidden');
    devicesTableWrap.classList.add('hidden');
    return;
  }
  devicesEmpty.classList.add('hidden');
  devicesTableWrap.classList.remove('hidden');
  devicesBody.innerHTML = '';

  for (var i = 0; i < keys.length; i++) {
    var dev = devicesRegistry[keys[i]];
    var tr = document.createElement('tr');

    var tdName = document.createElement('td');
    tdName.textContent = dev.name || '-';

    var tdLocation = document.createElement('td');
    tdLocation.textContent = dev.location || '-';

    var tdId = document.createElement('td');
    tdId.className = 'font-mono text-xs select-all cursor-pointer break-all max-w-[14rem]';
    tdId.textContent = dev.id || '-';

    var tdSynced = document.createElement('td');
    tdSynced.className = 'font-mono text-sm whitespace-nowrap';
    tdSynced.textContent = dev.lastSynced ? formatTime(new Date(dev.lastSynced)) : '-';

    var tdTemp = document.createElement('td');
    tdTemp.className = 'font-mono';
    tdTemp.textContent = dev.lastTemp !== null ? dev.lastTemp.toFixed(1) + ' °C' : '-';

    var tdHum = document.createElement('td');
    tdHum.className = 'font-mono';
    tdHum.textContent = dev.lastHumidity !== null ? dev.lastHumidity + ' %' : '-';

    tr.appendChild(tdName);
    tr.appendChild(tdLocation);
    tr.appendChild(tdId);
    tr.appendChild(tdSynced);
    tr.appendChild(tdTemp);
    tr.appendChild(tdHum);
    devicesBody.appendChild(tr);
  }
}

/* ---- Sync log (localStorage) ---- */

function getHistory() {
  return JSON.parse(localStorage.getItem('lywsd02_history') || '[]');
}

function saveToHistory(entry) {
  var history = getHistory();
  history.push(entry);
  localStorage.setItem('lywsd02_history', JSON.stringify(history));
}

function showLogTable() {
  logEmpty.classList.add('hidden');
  logTableWrap.classList.remove('hidden');
}

function addLogRow(name, id, status, time) {
  showLogTable();
  var tr = document.createElement('tr');

  var tdName = document.createElement('td');
  tdName.textContent = name || '-';

  var tdId = document.createElement('td');
  tdId.className = 'font-mono text-xs select-all cursor-pointer break-all max-w-[14rem]';
  tdId.textContent = id || '-';

  var tdStatus = document.createElement('td');
  if (status === 'error') {
    tr.className = 'opacity-50';
    tdStatus.innerHTML = '<span class="badge badge-error badge-sm">failed</span>';
  } else {
    tdStatus.innerHTML = '<span class="badge badge-success badge-sm">synced</span>';
  }

  var tdTime = document.createElement('td');
  tdTime.className = 'font-mono text-sm whitespace-nowrap';
  tdTime.textContent = typeof time === 'string' ? formatTime(new Date(time)) : formatTime(time);

  tr.appendChild(tdName);
  tr.appendChild(tdId);
  tr.appendChild(tdStatus);
  tr.appendChild(tdTime);
  logBody.insertBefore(tr, logBody.firstChild);
}

function logSync(name, id, status) {
  var now = new Date();
  addLogRow(name, id, status, now);
  saveToHistory({ name: name, id: id, action: status || 'synced', time: now.toISOString() });
  if (id && status !== 'error') {
    updateDeviceRegistry(name, id, { synced: now.toISOString() });
  }
}

function logReading(name, id, tempC, humidity) {
  if (id) {
    updateDeviceRegistry(name, id, { temp: tempC, humidity: humidity });
  }
}

/* ---- BLE operations ---- */

function readTempHumidity(service, name, id) {
  return service.getCharacteristic(TEMP_HUM_CHAR)
    .then(function (char) {
      return new Promise(function (resolve) {
        char.addEventListener('characteristicvaluechanged', function handler(event) {
          char.removeEventListener('characteristicvaluechanged', handler);
          var data = event.target.value;
          var tempRaw = data.getInt16(0, true);
          var tempC = tempRaw / 100;
          var humidity = data.getUint8(2);
          logReading(name, id, tempC, humidity);
          char.stopNotifications().then(resolve).catch(resolve);
        });
        char.startNotifications();
      });
    })
    .catch(function () {});
}

function buildTimePayload() {
  var timestamp = Math.floor(Date.now() / 1000);
  var offset = getTimezoneOffsetHours();
  var buffer = new ArrayBuffer(5);
  var view = new DataView(buffer);
  view.setUint32(0, timestamp, true);
  view.setInt8(4, offset);
  return buffer;
}

function syncDevice(device) {
  var name = device.name || '';
  var id = device.id || '';
  return device.gatt.connect()
    .then(function (server) {
      return server.getPrimaryService(TIME_SERVICE);
    })
    .then(function (service) {
      return service.getCharacteristic(TIME_CHAR)
        .then(function (char) {
          return char.writeValue(buildTimePayload());
        })
        .then(function () {
          logSync(name, id);
          return readTempHumidity(service, name, id);
        });
    })
    .then(function () {
      if (device.gatt.connected) device.gatt.disconnect();
    })
    .catch(function () {
      logSync(name, id, 'error');
      if (device.gatt.connected) device.gatt.disconnect();
    });
}

/* ---- Load on page start ---- */

function loadHistory() {
  var history = getHistory();
  for (var i = 0; i < history.length; i++) {
    var entry = history[i];
    if (entry.action !== undefined) {
      addLogRow(entry.name, entry.id, entry.action, entry.time);
    }
  }
}

loadDevicesJson();
loadHistory();

/* ---- Button handlers ---- */

btnAdd.addEventListener('click', function () {
  navigator.bluetooth.requestDevice({
    acceptAllDevices: true,
    optionalServices: [TIME_SERVICE]
  })
  .then(function (device) {
    updateDeviceRegistry(device.name || '', device.id || '', {});
    setStatus('Syncing ' + (device.name || device.id) + '\u2026', 'info');
    return syncDevice(device);
  })
  .then(function () {
    setStatus('Done', 'success');
  })
  .catch(function (error) {
    setStatus(friendlyError(error), 'error');
  });
});

btnSyncAll.addEventListener('click', function () {
  if (!navigator.bluetooth.getDevices) {
    setStatus('getDevices() not supported — enable chrome://flags/#enable-web-bluetooth-new-permissions-backend', 'error');
    return;
  }

  setStatus('Scanning for paired devices\u2026', 'info');
  setSyncing(true);

  navigator.bluetooth.getDevices()
    .then(function (devices) {
      if (devices.length === 0) {
        setStatus('No paired devices — add one first', 'error');
        setSyncing(false);
        return;
      }

      var total = devices.length;
      var done = 0;
      setStatus('Syncing 0/' + total + ' devices\u2026', 'info');

      var promises = devices.map(function (device) {
        return new Promise(function (resolve) {
          var resolved = false;
          function finish() {
            if (!resolved) {
              resolved = true;
              done++;
              setStatus('Syncing ' + done + '/' + total + ' devices\u2026', 'info');
              resolve();
            }
          }

          var timer = setTimeout(function () {
            logSync(device.name || '', device.id || '', 'error');
            finish();
          }, 10000);

          device.addEventListener('advertisementreceived', function onAdv() {
            device.removeEventListener('advertisementreceived', onAdv);
            clearTimeout(timer);
            syncDevice(device).then(finish).catch(finish);
          });

          device.watchAdvertisements({ signal: AbortSignal.timeout(10000) })
            .catch(function () {
              clearTimeout(timer);
              syncDevice(device).then(finish).catch(finish);
            });
        });
      });

      return Promise.all(promises);
    })
    .then(function () {
      setStatus('All done', 'success');
      setSyncing(false);
    })
    .catch(function (error) {
      setStatus(friendlyError(error), 'error');
      setSyncing(false);
    });
});
</script>
</body>
</html>
